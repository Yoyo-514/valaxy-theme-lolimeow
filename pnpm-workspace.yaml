  - demo

catalog:
  '@antfu/eslint-config': ^7.6.1
  '@iconify-json/ant-design': ^1.2.5
  '@iconify-json/simple-icons': ^1.2.72
  '@unocss/eslint-plugin': ^66.6.5
  bumpp: ^10.4.1
  eslint: ^10.0.2
  eslint-plugin-format: ^2.0.1
  typescript: ^5.9.3
  valaxy: ^0.27.0
  vitest: ^4.0.18
  vue-tsc: ^3.2.5
