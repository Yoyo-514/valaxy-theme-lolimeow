  '@unocss/eslint-plugin': ^66.6.0
  bumpp: ^10.4.1
  eslint: ^10.0.0
  eslint-plugin-format: ^1.4.0
  typescript: ^5.9.3
  valaxy: ^0.27.0
  vitest: ^4.0.18
  vue-tsc: ^3.2.4
