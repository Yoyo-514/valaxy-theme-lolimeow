name: GitHub Pages

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5.0.0
        with:
          version: 10
      - uses: actions/setup-node@v3
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install
        run: pnpm install

      - name: Build Demo
        run: pnpm run build:demo

      - name: Build Docs
        run: pnpm run docs:build

      - name: Merge Docs Into Demo
        run: mkdir -p ./demo/dist/docs && cp -r ./docs/.vitepress/dist/* ./demo/dist/docs/

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./demo/dist
          force_orphan: true
